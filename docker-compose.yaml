services:
  grafana:
    extends:
      file: .config/docker-compose-base.yaml
      service: grafana
    ports:
      - 3000:3000/tcp
    build:
      args:
        grafana_version: 13.1.0
    entrypoint: ["/bin/sh", "-c", "/usr/share/grafana/bin/grafana cli plugins install grafana-llm-app && /usr/share/grafana/bin/grafana cli plugins install marcusolsson-static-datasource && exec /entrypoint.sh"]

  timescale:
    image: timescale/timescaledb:latest-pg14
    restart: always
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - 5432:5432
    volumes:
      - ./timescale:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    profiles:
      - dev
      - main
      - dependency
      - playwright

  server:
    build:
      context: ./timescale
    ports:
      - 3001:3001/tcp
    depends_on:
      timescale:
        condition: service_healthy
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: timescale
    profiles:
      - dev
      - main
      - dependency
      - playwright

  playwright:
    build:
      context: .
      dockerfile: test/Dockerfile
    environment:
      - GRAFANA_URL=http://grafana:3000
    volumes:
      - ./test:/app/test
      - ./playwright-report:/app/playwright-report
    depends_on:
      - grafana
      - timescale
      - server
    profiles:
      - playwright
