services:
  grafana:
    extends:
      file: .config/docker-compose-base.yaml
      service: grafana
    ports:
      - 3000:3000/tcp
    build:
      args:
        grafana_version: ${GRAFANA_VERSION:-13.1.0}
    entrypoint: ["/bin/sh", "-c", "/usr/share/grafana/bin/grafana cli plugins install grafana-llm-app && exec /entrypoint.sh"]
    environment:
      - GF_DEFAULT_APP_MODE=development
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/links.json
      - GF_PLUGINS_PREINSTALL=marcusolsson-static-datasource,volkovlabs-variable-panel,volkovlabs-form-panel,volkovlabs-image-panel,grafana-llm-app
      - GF_FEATURE_TOGGLES_ENABLE=externalServiceAccounts
      - GF_AUTH_MANAGED_SERVICE_ACCOUNTS_ENABLED=true
      - OPENAI_ORG_ID=
      - OPENAI_API_KEY=
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O /dev/null http://localhost:3000/api/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  timescale:
    image: timescale/timescaledb:latest-pg14@sha256:0f5553d37abbe0f20bfe0a04dab5d1238955b5cda2711aba403090f95b6e51ff
    restart: always
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - 5432:5432
    volumes:
      - ./timescale:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    profiles:
      - dev
      - main
      - dependency
      - playwright

  server:
    build:
      context: ./timescale
    ports:
      - 3001:3001/tcp
    depends_on:
      timescale:
        condition: service_healthy
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: timescale
    profiles:
      - dev
      - main
      - dependency
      - playwright

  playwright:
    build:
      context: .
      dockerfile: test/Dockerfile
    environment:
      - GRAFANA_URL=http://grafana:3000
    volumes:
      - ./test:/app/test
      - ./playwright-report:/app/playwright-report
    depends_on:
      grafana:
        condition: service_healthy
      timescale:
        condition: service_healthy
      server:
        condition: service_started
    profiles:
      - playwright
